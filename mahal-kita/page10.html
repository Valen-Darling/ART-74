<!DOCTYPE html>
<html>
<head>
<title>Countdown 2026</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
background-color: black;
color: white;
font-family: Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
flex-direction: column;
overflow: hidden;
}

/* Countdown */
#countdown {
font-size: 70px;
text-align: center;
opacity: 0;
transition: opacity 0.3s ease;
}

/* IMAGE SCREEN */
#imageContainer {
display: none;
position: relative;
justify-content: center;
align-items: center;
width: 100%;
height: 100%;
}

/* Image */
#finalImage {
width: 100%;
max-width: 450px;
border-radius: 12px;
box-shadow: 0 0 25px rgba(255,255,255,0.15);
cursor: pointer;
}

/* TITLE ON IMAGE */
.titleOverlay {
position: absolute;
top: 20px;
width: 100%;
text-align: center;
font-size: 26px;
font-weight: bold;
text-shadow: 0 2px 10px rgba(0,0,0,0.7);
pointer-events: none;
}

/* CAPTION */
.captionOverlay {
position: absolute;
bottom: 20px;
width: 100%;
text-align: center;
font-size: 14px;
padding: 0 20px;
color: #f2f2f2;
text-shadow: 0 2px 10px rgba(0,0,0,0.7);
pointer-events: none;
}

/* Mobile */
@media (max-width: 480px) {
#countdown { font-size: 50px; }
.titleOverlay { font-size: 22px; }
.captionOverlay { font-size: 13px; }
}

</style>
</head>

<body>

<div id="countdown">10</div>

<div id="imageContainer">

<div class="titleOverlay">Happy New Year!</div>

<img id="finalImage" src="../images/matt_page10.jpg" alt="final image">

<div class="captionOverlay">
Ended 2025, and starting 2026 with you 💞 (click on image to proceed)
</div>

</div>

<script>

const countdownEl = document.getElementById('countdown');
const imageContainer = document.getElementById('imageContainer');
const finalImage = document.getElementById('finalImage');

let number = 10;
let interval = 900;

function showNextNumber() {

if (number > 0) {

countdownEl.textContent = number;
countdownEl.style.opacity = 1;

setTimeout(() => {
countdownEl.style.opacity = 0;
number--;
setTimeout(showNextNumber, 250);
}, interval);

} else {

countdownEl.style.display = "none";
imageContainer.style.display = "flex";

}

}

/* click anywhere on image to continue */
finalImage.addEventListener("click", () => {
window.location.href = "page11.html";
});

showNextNumber();

</script>

</body>
</html>
