<!DOCTYPE html>
<html>
<head>
<title>Countdown 2026</title>
<style>
body {
    background-color: black;
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    flex-direction: column;
}

#countdown {
    font-size: 80px;
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s ease;
}

#videoContainer {
    display: none;
    justify-content: center;
    align-items: center;
    width: 100%;
    height: 100%;
}

video {
    width: 500px;
    max-width: 90%;
    height: auto;
    display: block;
    background: black;
}
}
</style>
</head>
<body>

<div id="countdown">10</div>

<div id="videoContainer">
    <video id="video" autoplay muted playsinline controls>
        <source src="video/matt_page10.mp4" type="video/mp4">
    </video>
</div>

<script>
const countdownEl = document.getElementById('countdown');
const videoContainer = document.getElementById('videoContainer');
const video = document.getElementById('video');

let number = 10;

function showNextNumber() {
    if (number > 0) {
        countdownEl.textContent = number;
        countdownEl.style.opacity = 1;

        setTimeout(() => {
            countdownEl.style.opacity = 0;
            number--;
            setTimeout(showNextNumber, 500);
        }, 1000);

    } else {
        countdownEl.style.display = "none";
        videoContainer.style.display = "flex";

        video.play().catch(err => {
            console.log("Autoplay blocked:", err);
        });

        video.onended = () => {
            window.location.href = "page11.html";
        };
    }
}

showNextNumber();
</script>

</body>
</html>
