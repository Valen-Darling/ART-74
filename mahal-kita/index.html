<style>

.title-box{

    padding: 50px 100px;
    background-color: white;
    border: 3px solid black;
}

/* FIX: prevent oversized title on mobile */
.title-box h1{
    font-family: "Brush Script MT", cursive;
    color: black;
    font-size: 100px;
    margin: 0;
    line-height:1;
}

/* BUTTONS */
.button{
    display: block;
    width: 200px;
    margin: 35px auto;
    padding: 15px;

    color: black;
    border: 2px solid black;
    background-color: white;

.button:hover{
    background-color: black;

    .title-box{

        padding: 30px 25px;
